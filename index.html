<!DOCTYPE html>
<html>

<head>

<title>QR Code Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
width:90%;
max-width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px;
margin:6px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.generate{
background:#667eea;
color:white;
}

.download{
background:#2ecc71;
color:white;
}

#qrcode{
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>QR Code Generator</h2>

<input type="text" id="link" placeholder="Enter your link">

<label>QR Color</label>
<input type="color" id="qrColor" value="#000000">

<label>QR Size</label>
<select id="qrSize">
<option value="150">Small</option>
<option value="200" selected>Medium</option>
<option value="300">Large</option>
</select>

<label>Logo (optional)</label>
<input type="file" id="logoUpload">

<label>Download Format</label>
<select id="format">
<option value="png" selected>PNG</option>
<option value="jpeg">JPG</option>
</select>

<button class="generate" onclick="generateQR()">Generate QR</button>

<button class="download" onclick="downloadQR()">Download</button>

<div id="qrcode"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

let qr;

function generateQR(){

document.getElementById("qrcode").innerHTML="";

let link=document.getElementById("link").value;
let size=document.getElementById("qrSize").value;
let color=document.getElementById("qrColor").value;

qr=new QRCode(document.getElementById("qrcode"),{
text:link,
width:size,
height:size,
colorDark:color,
colorLight:"#ffffff"
});

setTimeout(addLogo,200);

}

function addLogo(){

let logoInput=document.getElementById("logoUpload");

if(logoInput.files.length===0) return;

let file=logoInput.files[0];

let reader=new FileReader();

reader.onload=function(e){

let qrDiv=document.querySelector("#qrcode");

let img=document.createElement("img");

img.src=e.target.result;

img.style.width="40px";
img.style.position="absolute";
img.style.left="50%";
img.style.top="50%";
img.style.transform="translate(-50%,-50%)";

qrDiv.style.position="relative";

qrDiv.appendChild(img);

}

reader.readAsDataURL(file);

}

function downloadQR(){

let canvas=document.querySelector("#qrcode canvas");

let format=document.getElementById("format").value;

let link=document.createElement("a");

link.href=canvas.toDataURL("image/"+format);

link.download="qr_code."+format;

link.click();

}

</script>

</body>

</html>
