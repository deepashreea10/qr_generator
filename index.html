<!DOCTYPE html>
<html>

<head>

<title>QR Code Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:35px;
    border-radius:15px;
    text-align:center;
    width:90%;
    max-width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:15px;
    font-size:16px;
}

/* NEW: focus glow */
input:focus{
    outline:none;
    border:1px solid #667eea;
    box-shadow:0 0 6px rgba(102,126,234,0.6);
}

button{
    padding:12px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:6px;
    font-size:15px;
}

.generate{
    background:#667eea;
    color:white;
}

.download{
    background:#2ecc71;
    color:white;
}

.customize{
    background:#444;
    color:white;
}

#advanced{
    display:none;
    margin-top:10px;
}

#qrcode{
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>QR Code Generator</h2>

<input type="text" id="link" placeholder="Enter your link">

<button class="generate" onclick="generateQR()">Generate QR</button>

<button class="download" onclick="downloadQR()">Download QR</button>

<button class="customize" onclick="toggleCustomize()">Customize</button>

<div id="advanced">

<label>QR Color</label>
<input type="color" id="qrColor" value="#000000">

<label>QR Size</label>
<select id="qrSize">
<option value="150">Small</option>
<option value="200" selected>Medium</option>
<option value="300">Large</option>
</select>

<label>Logo (optional)</label>
<input type="file" id="logoUpload">

<label>Download Format</label>
<select id="format">
<option value="png" selected>PNG</option>
<option value="jpeg">JPG</option>
</select>

</div>

<div id="qrcode"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

let qr;

function toggleCustomize(){

let adv=document.getElementById("advanced");

if(adv.style.display==="none")
adv.style.display="block";
else
adv.style.display="none";

}

function generateQR(){

document.getElementById("qrcode").innerHTML="";

let link=document.getElementById("link").value;

let size=document.getElementById("qrSize")?.value || 200;

let color=document.getElementById("qrColor")?.value || "#000000";

qr=new QRCode(document.getElementById("qrcode"),{
text:link,
width:size,
height:size,
colorDark:color,
colorLight:"#ffffff"
});

setTimeout(addLogo,200);

}

function addLogo(){

let logoInput=document.getElementById("logoUpload");

if(!logoInput || logoInput.files.length===0) return;

let file=logoInput.files[0];

let reader=new FileReader();

reader.onload=function(e){

let qrDiv=document.querySelector("#qrcode");

let img=document.createElement("img");

img.src=e.target.result;

img.style.width="40px";
img.style.position="absolute";
img.style.left="50%";
img.style.top="50%";
img.style.transform="translate(-50%,-50%)";

qrDiv.style.position="relative";

qrDiv.appendChild(img);

}

reader.readAsDataURL(file);

}

function downloadQR(){

let canvas=document.querySelector("#qrcode canvas");

let format=document.getElementById("format")?.value || "png";

let link=document.createElement("a");

link.href=canvas.toDataURL("image/"+format);

link.download="qr_code."+format;

link.click();

}

</script>

</body>

</html>
